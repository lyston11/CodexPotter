name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: "0"
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  tag-check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate tag and extract version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          [[ "${GITHUB_REF_TYPE}" == "tag" ]] \
            || { echo "❌ Not a tag push"; exit 1; }
          [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]] \
            || { echo "❌ Tag '${GITHUB_REF_NAME}' doesn't look like a semver tag (vX.Y.Z)"; exit 1; }

          tag_ver="${GITHUB_REF_NAME#v}"
          echo "✅ Tag looks valid (${tag_ver})"
          echo "version=${tag_ver}" >> "$GITHUB_OUTPUT"

  build:
    needs: tag-check
    name: Build - ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    env:
      CODEX_POTTER_VERSION: ${{ needs.tag-check.outputs.version }}
    timeout-minutes: 60
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            target: aarch64-apple-darwin
          - runner: macos-latest
            target: x86_64-apple-darwin
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - runner: ubuntu-latest
            target: aarch64-unknown-linux-musl
            build_with: cross
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
          - runner: windows-latest
            target: aarch64-pc-windows-msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read pinned Rust toolchain
        id: rust-toolchain
        shell: bash
        run: |
          channel="$(awk -F'\"' '/^[[:space:]]*channel[[:space:]]*=/{print $2; exit}' rust-toolchain.toml)"
          if [[ -z "$channel" ]]; then
            echo "Failed to read Rust toolchain channel from rust-toolchain.toml." >&2
            cat rust-toolchain.toml >&2
            exit 1
          fi
          echo "channel=$channel" >> "$GITHUB_OUTPUT"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ steps.rust-toolchain.outputs.channel }}
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install cross
        if: ${{ runner.os == 'Linux' && matrix.build_with == 'cross' }}
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Install musl tools
        if: ${{ runner.os == 'Linux' && contains(matrix.target, 'musl') && matrix.build_with != 'cross' }}
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y musl-tools

      - name: Cargo build
        if: ${{ matrix.build_with != 'cross' }}
        shell: bash
        run: |
          set -euo pipefail
          cargo build -p codex-potter-cli --bin codex-potter --locked --release --target "${{ matrix.target }}"

      - name: Cross build
        if: ${{ runner.os == 'Linux' && matrix.build_with == 'cross' }}
        shell: bash
        run: |
          set -euo pipefail
          cross build -p codex-potter-cli --bin codex-potter --locked --release --target "${{ matrix.target }}"

      - name: Package (unix)
        if: ${{ runner.os != 'Windows' }}
        shell: bash
        env:
          VERSION: ${{ needs.tag-check.outputs.version }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail

          dist_dir="dist/${TARGET}"
          mkdir -p "${dist_dir}"

          cp "target/${TARGET}/release/codex-potter" "${dist_dir}/codex-potter"
          chmod +x "${dist_dir}/codex-potter"

          tar -C "${dist_dir}" -czf "${dist_dir}/codex-potter-${VERSION}-${TARGET}.tar.gz" codex-potter

      - name: Package (windows)
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        env:
          VERSION: ${{ needs.tag-check.outputs.version }}
          TARGET: ${{ matrix.target }}
        run: |
          $distDir = "dist/$env:TARGET"
          New-Item -ItemType Directory -Force -Path $distDir | Out-Null

          $exePath = "target/$env:TARGET/release/codex-potter.exe"
          Copy-Item $exePath "$distDir/codex-potter.exe"
          Compress-Archive -Path "$distDir/codex-potter.exe" -DestinationPath "$distDir/codex-potter-$env:VERSION-$env:TARGET.zip" -Force

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: codex-potter-${{ matrix.target }}
          path: dist/${{ matrix.target }}

  release:
    needs:
      - tag-check
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js (pack + publish)
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      # Trusted publishing requires a recent npm CLI (OIDC support).
      - name: Update npm
        run: npm install -g npm@latest

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Run packaging tests
        run: node --test npm/test/*.test.js

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Stage npm tarballs
        shell: bash
        env:
          VERSION: ${{ needs.tag-check.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist/npm
          node npm/scripts/stage-release-package.js "${GITHUB_WORKSPACE}/dist" "${VERSION}" "${GITHUB_WORKSPACE}/dist/npm"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ needs.tag-check.outputs.version }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ contains(needs.tag-check.outputs.version, '-') }}
          files: |
            dist/**/codex-potter-${{ needs.tag-check.outputs.version }}-*.tar.gz
            dist/**/codex-potter-${{ needs.tag-check.outputs.version }}-*.zip
            dist/npm/codex-potter-npm-*.tgz

      - name: Determine npm publish settings
        id: npm_publish_settings
        shell: bash
        env:
          VERSION: ${{ needs.tag-check.outputs.version }}
        run: |
          set -euo pipefail
          version="${VERSION}"

          if [[ "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "npm_tag=" >> "$GITHUB_OUTPUT"
          elif [[ "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+-alpha\.[0-9]+$ ]]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "npm_tag=alpha" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "npm_tag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: ${{ steps.npm_publish_settings.outputs.should_publish == 'true' }}
        shell: bash
        env:
          VERSION: ${{ needs.tag-check.outputs.version }}
          NPM_TAG: ${{ steps.npm_publish_settings.outputs.npm_tag }}
        run: |
          set -euo pipefail

          npm_tag="${NPM_TAG}"

          prefix=""
          if [[ -n "${npm_tag}" ]]; then
            prefix="${npm_tag}-"
          fi

          shopt -s nullglob
          tarballs=(dist/npm/*-"${VERSION}".tgz)
          if [[ ${#tarballs[@]} -eq 0 ]]; then
            echo "No npm tarballs found in dist/npm for version ${VERSION}"
            exit 1
          fi

          for tarball in "${tarballs[@]}"; do
            filename="$(basename "${tarball}")"
            tag=""

            case "${filename}" in
              codex-potter-npm-"${VERSION}".tgz)
                tag="${npm_tag}"
                ;;
              codex-potter-npm-*-"${VERSION}".tgz)
                platform="${filename#codex-potter-npm-}"
                platform="${platform%-${VERSION}.tgz}"
                tag="${prefix}${platform}"
                ;;
              *)
                echo "Unexpected npm tarball: ${filename}"
                exit 1
                ;;
            esac

            publish_cmd=(npm publish "${GITHUB_WORKSPACE}/${tarball}" --access public)
            if [[ -n "${tag}" ]]; then
              publish_cmd+=(--tag "${tag}")
            fi

            echo "+ ${publish_cmd[*]}"
            set +e
            publish_output="$("${publish_cmd[@]}" 2>&1)"
            publish_status=$?
            set -e

            echo "${publish_output}"
            if [[ ${publish_status} -eq 0 ]]; then
              continue
            fi

            if grep -qiE "previously published|cannot publish over|version already exists" <<< "${publish_output}"; then
              echo "Skipping already-published package version for ${filename}"
              continue
            fi

            exit "${publish_status}"
          done
