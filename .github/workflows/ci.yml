name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: "0"
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  rust:
    name: ${{ matrix.check.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        check:
          - name: Rustfmt
            command: cargo fmt --all -- --check
          - name: Clippy
            command: cargo clippy --workspace --all-targets --locked -- -D warnings
          - name: Tests
            command: cargo nextest run --workspace --locked --cargo-profile ci-test -P ci
          - name: Build
            command: cargo build --workspace --all-targets --locked
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read pinned Rust toolchain
        id: rust-toolchain
        run: |
          channel="$(awk -F'\"' '/^[[:space:]]*channel[[:space:]]*=/{print $2; exit}' rust-toolchain.toml)"
          if [[ -z "$channel" ]]; then
            echo "Failed to read Rust toolchain channel from rust-toolchain.toml." >&2
            cat rust-toolchain.toml >&2
            exit 1
          fi
          echo "channel=$channel" >> "$GITHUB_OUTPUT"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ steps.rust-toolchain.outputs.channel }}
          components: clippy, rustfmt

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install cargo-nextest
        if: matrix.check.name == 'Tests'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: ${{ matrix.check.command }}
        run: ${{ matrix.check.command }}

  npm:
    name: Packaging Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Run packaging tests
        shell: bash
        run: node --test npm/test/*.test.js
